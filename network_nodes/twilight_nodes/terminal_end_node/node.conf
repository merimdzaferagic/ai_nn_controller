# Register IP address
ip_address = aic_register

# Port to register with register
register_port = 5558

# Node ID - must be unique (Terminal_End = 401)
node_id = 401

# Port to publish measurements (legacy, not used with broker)
pub_port = 5562

# Twilight configuration
twilight_url = http://host.docker.internal:8000
device_name = Terminal_End
device_type = terminal

# Polling interval in seconds
poll_interval = 1.0
