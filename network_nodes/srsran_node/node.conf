# Register IP address
ip_address = aic_register

# port to register with register
register_port = 5558

# Node ID - must be unique (srsRAN = cell_id 10)
node_id = 10

# Port to publish measurements
pub_port = 5580

# InfluxDB connection (same as docker/.env)
influxdb_url = http://influxdb:8086
influxdb_token = <your-influxdb-token>
influxdb_org = srs
influxdb_bucket = srsran

# How often to poll InfluxDB (seconds)
poll_interval = 1
